# > QuantumultX 配置 - 参考 Shadowrocket / mihomo 优化
#
# > ⚠ 用法说明(必读)
# > 这是「自用模板」,不是开箱即用的订阅源。导入此配置后必须在 QX App 内完成:
# >   1. 「订阅」-「机场订阅」手动添加你自己的节点订阅 URL
# >      (本文件 [server_remote] 段为空,QX 不支持在配置文件内嵌订阅链接)
# >   2. 节点策略组依赖节点名包含地区关键字
# >      (如「美/US/日本/JP/新加坡/SG/家宽」等);
# >      若机场命名风格不匹配,请在 [policy] 段的 server-tag-regex 内追加。
# >   3. 「证书」栏首次使用需在 QX 内重新生成 MITM 证书并安装。
#
# > 建议在「其他设置 - GeoLite2 - 来源」填写下面任一链接,并开启「自动更新」
; https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
; https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb

# > 「通知」栏建议仅开启[策略检测通知]和[脚本通知]
# > 「VPN」栏建议关闭[兼容性增强][分流匹配优化][MPM]


[general]

# > 节点延迟测试 / 网络可达性
server_check_url = http://www.gstatic.com/generate_204
server_check_timeout = 3000
network_check_url = http://www.apple.com/library/test/success.html

# > 图标显示
profile_img_url = https://raw.githubusercontent.com/Orz-3/mini/master/Color/quantumultx.png

# > 节点 IP 检查(默认禁用,需要时切换 ip-api 任选)
geo_location_checker = disabled
;geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

# > 资源解析器(用于规则/订阅转换)
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

# > 排除路由(SSDP/NTP/Apple Captive 等不进 QX 处理)
excluded_routes = 239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32

# > 屏蔽 QUIC(UDP 443),强制 YouTube/Google 等走 TCP,避免 UDP 直连绕过分流
# > 等价于 Shadowrocket 的 block-quic = all-proxy
udp_whitelist = 1-442, 444-65535

# > DNS 排除列表(走系统 DNS,避免与运营商定位/支付/出行类业务冲突)
dns_exclusion_list = *.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.tenpay.com, *.alipay.com, *.weixin.qq.com



[dns]

# > 启用 DoH3 加速;若客户端不稳定可注释
prefer-doh3

# > 关闭 IPv6 与系统 DNS,统一由 QX 解析,避免双栈/系统 DNS 漏出
no-ipv6
no-system

# > 加密 DNS 上游(国内 DoH,抗劫持/抗污染),对齐 SR 的 dns.alidns + doh.pub 组合
doh-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query

# > 国内业务域名走腾讯/阿里 DNS,获取最优 CDN
server = /*.icloud.com/119.29.29.29
server = /*.icloud.com.cn/119.29.29.29
server = /*.tencent.com/119.29.29.29
server = /*.weixin.com/119.29.29.29
server = /*.weixin.qq.com/119.29.29.29
server = /*.qq.com/119.29.29.29
server = /*.alipay.com/223.5.5.5
server = /*.taobao.com/223.5.5.5
server = /*.tmall.com/223.5.5.5



[task_local]

# > 流媒体解锁 / 节点切换面板(参考 KOP-XIAO 套件)
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming-ui-check.js, tag=流媒体解锁查询, img-url=arrowtriangle.right.square.system, enabled=true
