# 手动选择组 - 精确过滤规则
🏠 家宽节点 = select,policy-regex-filter=^(?=.*(?i)(?:家宽|住宅|家庭|家用|Residential|Home|ISP|原生|长稳|长时间))(?!.*(?i)(?:专线|到期|过期|剩余流量|剩余时间|官网|产品|倍率\s*(?:[6-9]|[1-9]\d)(?:\.\d+)?|(?:[6-9]|[1-9]\d)(?:\.\d+)?\s*(?:x|×|倍))).*$

# 自动选择组 - 精确过滤规则 {# 节点筛选}
