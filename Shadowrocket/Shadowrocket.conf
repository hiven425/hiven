[URL Rewrite]
# Google 重定向
^https?://(www\.)?g.cn https://www.google.com 302
^https?://(www\.)?google.cn https://www.google.com 302
^https?:\/\/(ditu|maps).google\.cn https://maps.google.com 302

[Module]
# 去广告基础模块
# 保持在前面，避免后续本地包装模块被其 MITM 定义反向覆盖。
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Shadowrocket/Advertising/Advertising.sgmodule, tag=去广告重写, enabled=true

# YouTube：使用本地包装模块，保留上游能力但把 hostname 改为 %APPEND%。
https://raw.githubusercontent.com/hiven425/hiven/refs/heads/master/config/shadowrocket-youtube.sgmodule, tag=油管增强, enabled=true

# Spotify：保留 Premium 解锁；歌词翻译由下方独立脚本补充
https://raw.githubusercontent.com/app2smile/rules/master/module/spotify.module, tag=Spotify Premium, enabled=true

# Google：使用本地包装模块，避免上游模块直接重写 hostname。
https://raw.githubusercontent.com/hiven425/hiven/refs/heads/master/config/shadowrocket-google.sgmodule, tag=Google增强, enabled=true

# 微信：iPhone 上若出现“连接中/收取中”，按需开启直连兼容模块。
https://raw.githubusercontent.com/hiven425/hiven/refs/heads/master/config/shadowrocket-wechat-compat.sgmodule, tag=微信直连兼容, enabled=false
[MITM]
enable = true
hostname = spclient.wg.spotify.com, *spclient.spotify.com

[Script]
# Spotify歌词翻译：脚本本身需要百度翻译 appid/securityKey，未配置参数时仅保留脚本位
spotify-lyrics = type=http-response,pattern=^https:\/\/spclient\.wg\.spotify\.com\/color-lyrics\/v2\/track\/,requires-body=1,binary-body-mode=1,max-size=0,script-path=https://raw.githubusercontent.com/app2smile/rules/master/js/spotify-lyric.js
