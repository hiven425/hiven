  - RULE-SET,google_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,google_gemini_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,onedrive_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,microsoft_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,cloudflare_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,tiktok_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,speedtest_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,telegram_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,netflix_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
