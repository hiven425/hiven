  - RULE-SET,geolocation-!cn,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,google_ip,рҹҡҖ иҠӮзӮ№йҖүжӢ©,no-resolve
  - RULE-SET,facebook_ip,рҹҡҖ иҠӮзӮ№йҖүжӢ©,no-resolve
  - RULE-SET,netflix_ip,рҹҡҖ иҠӮзӮ№йҖүжӢ©,no-resolve
  - RULE-SET,telegram_ip,рҹҡҖ иҠӮзӮ№йҖүжӢ©,no-resolve
