port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
geodata-mode: true
bind-address: '*'

external-controller: "127.0.0.1:9090"
secret: "Codex@2025!mihomo"
external-ui: "/etc/nikki/run/ui"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 30

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - dlg.io.mi.com
    - +.push.apple.com
    - +.apple.com
    - +.lan
    - +.local

tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #дҪҝз”ЁnikkiпјҢж··е…Ҙе…ЁйғЁдёҚдҝ®ж”№зҡ„жғ…еҶөпјҢејҖеҗҜжҺҘеҸЈжҢҮе®ҡдёәnikki
  #дҪҝз”Ёд»…еҶ…ж ёиҮӘиЎҢдҝ®ж”№дёӢйқўдёүйЎ№дёәtrue
  #device: nikki
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false



# DNSжЁЎеқ—
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  proxy-server-nameserver:
      - 119.29.29.29
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://8.8.8.8/dns-query
  nameserver-policy:
    "rule-set:private_domain,cn_domain,apple_domain":
      - 223.5.5.5
      - 119.29.29.29
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain,apple_domain"

# еҚ•дёҖд»ЈзҗҶеҲҶз»„пјҡиҒҡеҗҲе…ЁйғЁжңүж•ҲиҠӮзӮ№е№¶жҜҸ30з§’иҮӘеҠЁеҲҮжҚў
proxy-groups:
  - name: рҹҡҖ иҠӮзӮ№йҖүжӢ©
    type: load-balance
    include-all: true
    filter: '^(?!.*(?i)(?:еҲ°жңҹ|иҝҮжңҹ|еү©дҪҷ|жөҒйҮҸ|ж—¶й—ҙ|е®ҳзҪ‘|дә§е“Ғ|и¶…ж—¶|timeout|timed out|еӨұиҒ”|дёҚеҸҜз”Ё|ж•…йҡң|unavailable|failed)).*$'
    exclude-filter: '(?i)(и¶…ж—¶|timeout|timed out|еӨұиҒ”|дёҚеҸҜз”Ё|ж•…йҡң|unavailable|failed)'
    strategy: round-robin
    lazy: false
    max-failed-times: 1
    interval: 30
    url: http://www.gstatic.com/generate_204

rules:
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,my_direct,DIRECT
  - RULE-SET,category-ads-all,REJECT
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,my_proxylite,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,my_ai,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,my_wm,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,openai_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,ai_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,github_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,youtube_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,facebook_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,whatsapp_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,instagram_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
  - RULE-SET,linkedin_domain,рҹҡҖ иҠӮзӮ№йҖүжӢ©
