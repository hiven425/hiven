port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
geodata-mode: true
bind-address: '*'

external-controller: "127.0.0.1:9090"
secret: "Codex@2025!mihomo"
external-ui: "/etc/nikki/run/ui"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

find-process-mode: strict
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 30

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - dlg.io.mi.com
    - +.push.apple.com
    - +.apple.com
    - +.lan
    - +.local

tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #使用仅内核自行修改下面三项为true
  #device: nikki
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false



# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  proxy-server-nameserver:
      - 119.29.29.29
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://8.8.8.8/dns-query
  nameserver-policy:
    "rule-set:private_domain,cn_domain,apple_domain":
      - 223.5.5.5
      - 119.29.29.29
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain,apple_domain"

templates:
  - &url_test_template
    type: url-test
    include-all: true
    tolerance: 30
    interval: 600
    url: http://www.gstatic.com/generate_204
  - &GlobalProxies
    type: select
    proxies: [♻️ 自动选择, 🚀 节点选择, 🇺🇲 美国节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇸🇬 新加坡节点, 🇭🇰 香港节点, 🏚️ 家宽节点, DIRECT]
  - &USProxies
    type: select
    proxies: [🇺🇲 美国节点, ♻️ 自动选择, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇸🇬 新加坡节点, 🏚️ 家宽节点, DIRECT]
  - &DirectFirst
    type: select
    proxies: [DIRECT, 🏚️ 家宽节点, 🚀 节点选择]
  - &AIProxies
    type: select
    proxies: [🇺🇲 美国节点, 🏚️ 家宽节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇸🇬 新加坡节点, ♻️ 自动选择]

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇲 美国节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇸🇬 新加坡节点, 🏚️ 家宽节点, 🌍 其他节点, DIRECT]
  - name: 📹 YouTube
    <<: *GlobalProxies
  - name: 🍀 Google
    <<: *AIProxies
  - name: 🍒 microsoft
    <<: *GlobalProxies
  - name: 🏹 ChatGPT
    <<: *AIProxies
  - name: 🐬 外贸
    <<: *USProxies
  - name: 🎵 TikTok
    <<: *GlobalProxies
  - name: 📲 Telegram
    <<: *GlobalProxies
  - name: 🎥 NETFLIX
    <<: *GlobalProxies
  - name: ✈️ Speedtest
    <<: *GlobalProxies
  - name: 💶 PayPal
    <<: *GlobalProxies
  - name: ☁️ cloudflare
    <<: *GlobalProxies
  - name: 🍎 Apple
    <<: *DirectFirst
  - name: 🎯 全球直连
    <<: *DirectFirst
  - name: 🐟 漏网之鱼
    <<: *DirectFirst
  - name: 🛑 广告拦截
    type: select
    proxies: [REJECT, DIRECT]
  - name: 🇭🇰 香港节点
    <<: *url_test_template
    filter: '^(?=.*(?i)(?:香港|港|🇭🇰|HK|Hong Kong|HKG|沪港|深港|Kowloon|Victoria))(?!.*(?i)(?:美|🇺🇸|US|台|🇹🇼|TW|日|🇯🇵|JP|新|🇸🇬|SG|韩|🇰🇷|KR|专线|倍率|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: 🇺🇲 美国节点
    <<: *url_test_template
    filter: '^(?=.*(?i)(?:美|🇺🇸|US|USA|States|American|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|纽约|New York|Miami|Boston|United States|San Francisco))(?!.*(?i)(?:港|🇭🇰|HK|台|🇹🇼|TW|日|🇯🇵|JP|新|🇸🇬|SG|韩|巴西|阿根廷|🇰🇷|KR|专线|倍率|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: 🇯🇵 日本节点
    <<: *url_test_template
    filter: '^(?=.*(?i)(?:日本|🇯🇵|JP|NRT|KIX|FUK|Japan|川日|东京|大阪|泉日|埼玉|名古屋|Nagoya|Kyoto|Okinawa))(?!.*(?i)(?:美|🇺🇸|US|港|🇭🇰|HK|台|🇹🇼|TW|新|🇸🇬|SG|韩|🇰🇷|KR|专线|倍率|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: 🇹🇼 台湾节点
    <<: *url_test_template
    filter: '^(?=.*(?i)(?:台湾|台|🇹🇼|TW|TPE|KHH|Taiwan|新北|彰化|台北|Taipei|高雄|Kaohsiung|Taichung|台中))(?!.*(?i)(?:美|🇺🇸|US|港|🇭🇰|HK|日|🇯🇵|JP|新|🇸🇬|SG|韩|🇰🇷|KR|专线|倍率|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: 🇸🇬 新加坡节点
    <<: *url_test_template
    filter: '^(?=.*(?i)(?:新加坡|坡|狮城|🇸🇬|SG|SIN|Singapore|Changi|Marina Bay))(?!.*(?i)(?:美|🇺🇸|US|港|🇭🇰|HK|台|🇹🇼|TW|日|🇯🇵|JP|韩|🇰🇷|KR|专线|倍率|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: 🌍 其他节点
    <<: *url_test_template
    filter: '^(?!.*(?i)(?:美|🇺🇸|US|日本|🇯🇵|JP|台湾|🇹🇼|TW|新加坡|🇸🇬|SG|香港|🇭🇰|HK|韩|🇰🇷|KR|专线|倍率|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: 🏚️ 家宽节点
    type: select
    include-all: true
    filter: '^(?=.*(?i)(?:家宽))(?!.*(?i)(?:亚洲|试车|到期|过期|剩余|流量|时间|官网|产品)).*$'
  - name: ♻️ 自动选择
    type: url-test
    proxies: [🇭🇰 香港节点, 🇺🇲 美国节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇸🇬 新加坡节点, 🌍 其他节点]
    tolerance: 30
    interval: 600
    url: http://www.gstatic.com/generate_204

rules:
